name: 'oss_pulse_dbt'
version: '1.0.0'
config-version: 2

profile: 'oss_pulse_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

on-run-start:
  - "{{ register_external_sources() }}"

models:
  oss_pulse_dbt:
    +file_format: delta
    silver:
      +materialized: table
      +schema: silver
    gold:
      +schema: gold

vars:
  # Bronze location. Resolution order:
  #   1. OSS_PULSE_BRONZE_PATH env var (used in Sprint 5a cloud target to
  #      point at s3a://... — see runbooks/cloud_apply_walkthrough.md)
  #   2. --vars '{bronze_events_path: ...}' on the CLI
  #   3. Default: ../data/bronze/events — repo-relative, works for any
  #      reviewer who clones the repo and runs from the dbt/ directory
  bronze_events_path: "{{ env_var('OSS_PULSE_BRONZE_PATH', '../data/bronze/events') }}"
