version: 2

models:
  - name: repo_daily_activity
    description: |
      Gold: one row per (repo_id, activity_date). Daily PushEvent rollup
      with bot/non-bot split. Source of truth for the Repo Growth mart
      (Sprint 3) and downstream anomaly detection.

      See design doc: docs/marts/gold_repo_daily_activity.md
      Bot rule (A only): docs/spikes/bot_heuristic.md (Sprint 2.5)
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - repo_id
            - activity_date
    columns:
      - name: repo_id
        description: GitHub repository id (stable across renames, ADR-0004)
        tests:
          - not_null
      - name: activity_date
        description: DATE(created_at) of the PushEvent (UTC, not ingest_hour)
        tests:
          - not_null
      - name: repo_name
        description: Most recent repo_name observed for the repo on that day
      - name: push_count
        description: Distinct PushEvent count for this repo/day
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: total_commits
        description: sum(payload.size) across all pushes — includes merge/duplicate commits
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: distinct_commits
        description: sum(payload.distinct_size) — GitHub's per-push de-duped count
        tests:
          - not_null
      - name: unique_pushers
        description: count(distinct actor_id) — humans + bots together
        tests:
          - not_null
      - name: bot_push_count
        description: Pushes where actor_login ends with [bot] (spike Rule A)
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: non_bot_push_count
        description: push_count - bot_push_count
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "= push_count - bot_push_count"

  - name: oss_health_mart
    description: |
      Gold: one row per (repo_id, activity_date). Daily project-health
      signals: PR lifecycle latency, issue lifecycle latency, comment
      activity, first-response responsiveness, unique contributors.

      Bridges raw activity counts (repo_daily_activity) with the
      quality dimensions OSS funders / recruiters / vendors care about.

      Sources: silver.events_pull_request, silver.events_issues,
               silver.events_issue_comment.
      Design: docs/marts/gold_oss_health_mart.md
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - repo_id
            - activity_date
    columns:
      - name: repo_id
        description: GitHub repository id (ADR-0004)
        tests:
          - not_null
      - name: activity_date
        description: |
          Date the responsive action happened (PR closed, issue closed,
          comment posted, first response posted). Not the open date.
        tests:
          - not_null
      - name: pr_opened_count
        description: PullRequestEvent rows with action='opened'
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: pr_closed_count
        description: PullRequestEvent rows with action='closed' (merged or not)
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: pr_merged_count
        description: PullRequestEvent rows with action='closed' AND pr_merged=true
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
          - dbt_utils.expression_is_true:
              expression: "<= pr_closed_count"
      - name: pr_avg_merge_latency_hours
        description: |
          For PRs merged on this day, avg(merged_at - created_at) in hours.
          Null when pr_merged_count = 0.
      - name: issue_opened_count
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: issue_closed_count
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: issue_avg_close_latency_hours
        description: avg(issue_closed_at - issue_created_at) in hours, null when no closes
      - name: issue_comment_count
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: issue_avg_first_response_hours
        description: |
          Per-issue: first non-opener comment timestamp minus issue open
          timestamp, averaged across issues whose first response happened
          on this day. Sample-window limitation documented in design doc.
      - name: unique_contributors
        description: |
          count(distinct actor_id) across PR + issue + comment events for
          this repo on this day
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
